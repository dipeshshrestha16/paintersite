<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600">
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e8dc"/>
      <stop offset="100%" stop-color="#e8ddd0"/>
    </linearGradient>
    <linearGradient id="accent-wall" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#34495e"/>
    </linearGradient>
    <linearGradient id="floor-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a87a"/>
      <stop offset="100%" stop-color="#b09060"/>
    </linearGradient>
    <linearGradient id="window-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bdd8e8"/>
      <stop offset="100%" stop-color="#ddeef8"/>
    </linearGradient>
  </defs>

  <!-- Main wall background -->
  <rect width="1400" height="600" fill="url(#wall)"/>

  <!-- Floor -->
  <rect x="0" y="430" width="1400" height="170" fill="url(#floor-g)"/>
  <rect x="0" y="428" width="1400" height="6" fill="#c0986a"/>

  <!-- Left accent wall (freshly painted, brand colour) -->
  <rect x="0" y="0" width="420" height="430" fill="url(#accent-wall)"/>

  <!-- Paint roller marks on accent wall — subtle lighter stripes -->
  <rect x="0" y="0"   width="420" height="145" fill="rgba(255,255,255,0.04)"/>
  <rect x="0" y="145" width="420" height="145" fill="rgba(0,0,0,0.04)"/>
  <rect x="0" y="290" width="420" height="140" fill="rgba(255,255,255,0.03)"/>

  <!-- Corner wall junction -->
  <line x1="420" y1="0" x2="420" y2="430" stroke="#d4b896" stroke-width="3"/>

  <!-- Right section wall -->
  <rect x="1000" y="0" width="400" height="430" fill="#ede4d8"/>

  <!-- Large window -->
  <rect x="1040" y="60" width="320" height="310" fill="url(#window-sky)" rx="1"/>
  <rect x="1035" y="55" width="330" height="320" fill="none" stroke="#c8a880" stroke-width="10" rx="1"/>
  <!-- Window mullions -->
  <line x1="1200" y1="55" x2="1200" y2="375" stroke="#c8a880" stroke-width="7"/>
  <line x1="1035" y1="215" x2="1365" y2="215" stroke="#c8a880" stroke-width="7"/>
  <!-- Window light shaft -->
  <polygon points="1365,55 1400,30 1400,450 1365,375" fill="rgba(255,235,180,0.18)"/>

  <!-- Skirting board -->
  <rect x="420" y="412" width="580" height="18" fill="#d0b890"/>

  <!-- Sofa -->
  <rect x="600" y="345" width="280" height="85" rx="8" fill="#9a7d5c"/>
  <rect x="580" y="305" width="320" height="50" rx="10" fill="#b09070"/>
  <rect x="580" y="305" width="18" height="125" rx="6" fill="#a08060"/>
  <rect x="882" y="305" width="18" height="125" rx="6" fill="#a08060"/>
  <rect x="605" y="428" width="22" height="14" fill="#907050"/>
  <rect x="854" y="428" width="22" height="14" fill="#907050"/>

  <!-- Cushions on sofa -->
  <rect x="600" y="315" width="80" height="40" rx="4" fill="#428bca" opacity="0.85"/>
  <rect x="700" y="315" width="80" height="40" rx="4" fill="#c8a880"/>
  <rect x="800" y="315" width="80" height="40" rx="4" fill="#428bca" opacity="0.6"/>

  <!-- Paint roller tool -->
  <rect x="290" y="170" width="120" height="42" rx="10" fill="#428bca"/>
  <rect x="290" y="170" width="120" height="42" rx="10" fill="none" stroke="#2e6da4" stroke-width="3"/>
  <!-- roller texture lines -->
  <line x1="310" y1="170" x2="310" y2="212" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
  <line x1="330" y1="170" x2="330" y2="212" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
  <line x1="350" y1="170" x2="350" y2="212" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
  <line x1="370" y1="170" x2="370" y2="212" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
  <line x1="390" y1="170" x2="390" y2="212" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
  <!-- Roller pole -->
  <rect x="345" y="210" width="10" height="140" rx="4" fill="#c8a070"/>
  <rect x="345" y="320" width="10" height="10" rx="2" fill="#a08050"/>

  <!-- Paint can on floor -->
  <ellipse cx="180" cy="448" rx="52" ry="16" fill="#1e2e40"/>
  <rect x="130" y="420" width="100" height="28" rx="4" fill="#2c3e50"/>
  <ellipse cx="180" cy="420" rx="50" ry="14" fill="#34495e"/>
  <text x="180" y="424" font-family="Arial,sans-serif" font-size="11" fill="#428bca" text-anchor="middle" font-weight="bold">PAINT</text>

  <!-- Painter silhouette -->
  <circle cx="500" cy="148" r="34" fill="#5a4030"/>
  <!-- body -->
  <rect x="468" y="180" width="64" height="120" rx="8" fill="#4a6888"/>
  <!-- legs -->
  <rect x="468" y="290" width="26" height="90" rx="6" fill="#3a5068"/>
  <rect x="506" y="290" width="26" height="90" rx="6" fill="#3a5068"/>
  <!-- arm extended toward wall with roller -->
  <rect x="528" y="196" width="78" height="20" rx="6" fill="#4a6888" transform="rotate(-18 528 196)"/>

  <!-- Small paint swatch cards on accent wall -->
  <rect x="50" y="80" width="55" height="70" fill="#ecf0f1" rx="1"/>
  <rect x="50" y="80" width="55" height="22" fill="#428bca" rx="1"/>
  <rect x="50" y="102" width="55" height="22" fill="#2c3e50" rx="1"/>
  <rect x="50" y="124" width="55" height="26" fill="#ecf0f1" rx="1"/>

  <rect x="115" y="80" width="55" height="70" fill="#ecf0f1" rx="1"/>
  <rect x="115" y="80" width="55" height="22" fill="#e8d4b8" rx="1"/>
  <rect x="115" y="102" width="55" height="22" fill="#c8a880" rx="1"/>
  <rect x="115" y="124" width="55" height="26" fill="#ecf0f1" rx="1"/>
</svg>
